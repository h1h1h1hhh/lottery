<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a001f,#1a0033 50%,#0d0028);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#fff;padding:15px}
h1{font-size:1.6em;margin:15px 0;text-shadow:0 0 30px #ffd700;text-align:center}
.ended{background:#f33;padding:15px 30px;border-radius:50px;font-size:1.2em;font-weight:bold;animation:pulse 1s infinite;margin:10px 0;text-align:center}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.3);border-radius:15px;padding:20px;max-width:360px;width:100%;text-align:center;margin:10px 0}
.card h2{color:#ffd700;margin-bottom:10px;font-size:1.2em}
input{width:80%;padding:10px 15px;border-radius:25px;border:2px solid #ffd700;background:rgba(255,255,255,.1);color:#fff;font-size:1.1em;text-align:center;margin:10px 0}
.btn{padding:14px 35px;border:none;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;margin:8px}
.btn-go{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0033}
.btn-go:disabled{opacity:.4}
.prize{color:#ffd700;font-size:1.1em;margin:5px 0}
.hint{color:#aaa;font-size:.8em;margin:8px 0}
.won{font-size:1.3em;color:#ffd700}
.fail{color:#f66}
.spin-anim{font-size:4em;animation:bounce .3s infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.2)}}
</style>
</head>
<body>
<h1>🎰 凤仪湾 · 啤酒狂欢</h1>
<div id="endedTop"></div>
<div class="card" id="card">
  <h2 id="cardTitle">请输入你的名字</h2>
  <div id="cardBody"><input id="nameInput" placeholder="输入名字"></div>
  <div id="cardFooter"><button class="btn btn-go" onclick="go()">🎯 开始抽奖</button></div>
</div>
<div class="hint" id="syncHint">加载中...</div>

<script>
const RAW='https://api.github.com/repos/h1h1h1hhh/lottery/contents/state.json';
const TK='ghp_'+'K9nIgzCtyWhjjCUTQTLatVnUEgbEXO1Bidv5';
const R=[
  {name:'🏆 特等奖',prize:'京东家电冰箱一台',count:1},
  {name:'🥇 一等奖',prize:'啤酒一箱+凤仪湾门票1张',count:2},
  {name:'🥈 二等奖',prize:'啤酒半箱+凤仪湾门票1张',count:3},
  {name:'🥉 三等奖',prize:'啤酒2瓶',count:6},
];
let W={0:[],1:[],2:[],3:[]},sha='',me='',busy=false;

async function load(){
  try{
    const r=await fetch(RAW,{headers:{Authorization:'token '+TK},cache:'no-cache'});
    const d=await r.json();sha=d.sha;
    const s=JSON.parse(atob(d.content));
    W=s.winners||{0:[],1:[],2:[],3:[]};
    const won=Object.values(W).flat().length;
    const total=R.reduce((a,r)=>a+r.count,0);
    document.getElementById('syncHint').textContent='剩余奖品：'+(total-won)+' 份';
    if(won>=total) document.getElementById('endedTop').innerHTML='<div class="ended">🎊 抽奖已结束，所有奖品已抽完</div>';
  }catch(e){document.getElementById('syncHint').textContent='⚠️ 加载失败';}
}

async function save(){
  const c=btoa(unescape(encodeURIComponent(JSON.stringify({winners:W,nameList:[]}))));
  const r=await fetch(RAW,{method:'PUT',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body:JSON.stringify({message:'抽奖',content:c,sha})});
  const d=await r.json();sha=d.content.sha;
}

async function go(){
  const inp=document.getElementById('nameInput');
  if(!inp.value.trim()){alert('请输入名字');return}
  me=inp.value.trim();
  await load();
  const total=R.reduce((a,r)=>a+r.count,0);
  const won=Object.values(W).flat();

  if(won.length>=total){
    document.getElementById('cardTitle').textContent='来晚了！';
    document.getElementById('cardBody').innerHTML='<p class="fail">所有奖品已被抽完</p>';
    document.getElementById('cardFooter').innerHTML='';
    return;
  }
  if(won.includes(me)){
    let p='';
    R.forEach((r,i)=>{if(W[i].includes(me))p=r.prize;});
    document.getElementById('cardTitle').textContent='你已经中奖了！';
    document.getElementById('cardBody').innerHTML='<p class="won">🏆 '+me+'</p><p class="prize">'+p+'</p><p style="color:#aaa">请到领奖处领取</p>';
    document.getElementById('cardFooter').innerHTML='';
    return;
  }
  showSpin();
}

function showSpin(){
  document.getElementById('cardTitle').textContent=me+'，试试手气！';
  document.getElementById('cardBody').innerHTML='<div class="spin-anim">🎰</div><p style="color:#ffd700">抽奖中...</p>';
  document.getElementById('cardFooter').innerHTML='';
  setTimeout(doSpin, 1500+Math.random()*1500);
}

async function doSpin(){
  await load();
  const total=R.reduce((a,r)=>a+r.count,0);
  const won=Object.values(W).flat();
  if(won.length>=total){
    document.getElementById('cardTitle').textContent='来晚了！';
    document.getElementById('cardBody').innerHTML='<p class="fail">奖品已被抽完</p>';
    return;
  }
  if(won.includes(me)){
    let p='';R.forEach((r,i)=>{if(W[i].includes(me))p=r.prize;});
    document.getElementById('cardTitle').textContent='你已经中奖了！';
    document.getElementById('cardBody').innerHTML='<p class="won">🏆 '+me+'</p><p class="prize">'+p+'</p>';
    return;
  }

  // 先到先得：只要还有奖品就中，随机分配奖项等级
  const avail=[];
  R.forEach((r,i)=>{if(W[i].length<r.count)avail.push(i)});
  const ri=avail[Math.floor(Math.random()*avail.length)];
  W[ri].push(me);
  await save();

  document.getElementById('cardBody').innerHTML='<p style="font-size:3em">🎊</p><p class="won">恭喜 '+me+'！</p><p class="prize">'+R[ri].prize+'</p><p style="color:#aaa">请到领奖处领取</p>';
  await load();
}

load();setInterval(load,15000);
</script>
</body>
</html>
