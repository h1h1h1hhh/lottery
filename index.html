<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a001f,#1a0033 50%,#0d0028);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:30px;max-width:360px;width:100%;text-align:center}
h1{font-size:1.4em;color:#ffd700;margin-bottom:20px}
input{width:100%;padding:12px 18px;border-radius:30px;border:2px solid rgba(255,215,0,.5);background:rgba(255,255,255,.08);color:#fff;font-size:1.1em;text-align:center;margin:12px 0;outline:none}
input:focus{border-color:#ffd700}
.btn{padding:14px 40px;border:none;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0033;margin:12px 0}
.btn:disabled{opacity:.4;pointer-events:none}
.result{margin-top:15px;font-size:1.1em}
.result .win{color:#ffd700;font-size:1.4em;font-weight:bold}
.result .lose{color:#aaa}
.result .prize{color:#ffd700;font-size:1em;margin-top:5px}
.result .ended{color:#f66;font-size:1.2em;font-weight:bold}
</style>
</head>
<body>
<div class="card" id="card">
  <h1>🎰 凤仪湾 · 啤酒狂欢</h1>
  <div id="content">
    <input id="nameInput" placeholder="请输入你的名字">
    <br><button class="btn" id="btn" onclick="go()">🎯 抽奖</button>
  </div>
  <div class="result" id="result"></div>
</div>

<script>
const RAW='https://api.github.com/repos/h1h1h1hhh/lottery/contents/state.json';
const TK='ghp_'+'K9nIgzCtyWhjjCUTQTLatVnUEgbEXO1Bidv5';
const R=[
  {name:'🏆 特等奖',prize:'京东家电冰箱一台',count:1,rate:.02},
  {name:'🥇 一等奖',prize:'啤酒一箱+凤仪湾门票1张',count:2,rate:.10},
  {name:'🥈 二等奖',prize:'啤酒半箱+凤仪湾门票1张',count:3,rate:.20},
  {name:'🥉 三等奖',prize:'啤酒2瓶',count:6,rate:.68},
];
let W={0:[],1:[],2:[],3:[]},sha='',me='',busy=false;

async function load(){
  try{
    const r=await fetch(RAW,{headers:{Authorization:'token '+TK},cache:'no-cache'});
    const d=await r.json();sha=d.sha;
    const s=JSON.parse(atob(d.content));
    W=s.winners||{0:[],1:[],2:[],3:[]};
  }catch(e){console.error(e)}
}

async function save(){
  const c=btoa(unescape(encodeURIComponent(JSON.stringify({winners:W,nameList:[]}))));
  const r=await fetch(RAW,{method:'PUT',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body:JSON.stringify({message:'r',content:c,sha})});
  const d=await r.json();sha=d.content.sha;
}

async function go(){
  if(busy)return;
  const n=document.getElementById('nameInput').value.trim();
  if(!n){show('请输入名字');return}
  me=n;busy=true;
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='抽奖中...';

  await load();
  const won=Object.values(W).flat();
  const total=12;

  // 已中奖检查
  if(won.includes(me)){
    let p='';R.forEach((r,i)=>{if(W[i].includes(me))p=r.prize;});
    showWin(me,p);busy=false;return;
  }
  // 全部抽完
  if(won.length>=total){showEnd();busy=false;return;}
  // localStorage 防重复
  if(localStorage.getItem('lot_ok')){show('每人只能抽一次哦');document.getElementById('btn').textContent='已抽过';busy=false;return;}

  // 模拟转圈
  await new Promise(r=>setTimeout(r,2000+Math.random()*2000));

  // 动态中奖概率：剩余奖品/估算剩余人数
  // 初始约50人，随已抽人数递减
  const spinned=parseInt(localStorage.getItem('lot_total')||'0')+1;
  const remainPrizes=total-won.length;
  // 概率 = 剩余奖品 / max(剩余奖品+预估剩余未抽人数, 1)
  const estRemain=Math.max(50-spinned, remainPrizes);
  const winRate=Math.min(remainPrizes/estRemain, .6);

  if(Math.random()<winRate){
    // 中奖！按设定概率分配奖项等级
    const rnd=Math.random();
    let tier=-1;
    let cum=0;
    for(let i=0;i<R.length;i++){
      if(W[i].length>=R[i].count)continue;
      cum+=R[i].rate;
      if(rnd<cum){tier=i;break;}
    }
    if(tier<0) tier=3; // fallback
    W[tier].push(me);
    await save();
    localStorage.setItem('lot_ok','1');
    showWin(me,R[tier].prize);
  }else{
    localStorage.setItem('lot_ok','1');
    showLose();
  }
  busy=false;
}

function showWin(name,prize){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="win">恭喜 '+name+'！</p><p class="prize">'+prize+'</p><p style="color:#aaa;font-size:.85em;margin-top:15px">请到领奖处领取奖品</p>';
}

function showLose(){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">😢</p><p class="lose">很遗憾，没有中奖</p><p style="color:#666;font-size:.8em;margin-top:15px">每人仅有一次机会</p>';
}

function showEnd(){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="ended">抽奖已结束</p><p style="color:#aaa;margin-top:10px">所有奖品已抽完</p>';
}

function show(msg){
  document.getElementById('result').innerHTML='<p class="lose">'+msg+'</p>';
}

load();
</script>
</body>
</html>
