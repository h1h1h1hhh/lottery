<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a001f,#1a0033 50%,#0d0028);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#fff;padding:15px}
h1{font-size:1.6em;margin:15px 0;text-shadow:0 0 30px #ffd700;text-align:center}
.ended{background:#f33;padding:15px 30px;border-radius:50px;font-size:1.2em;font-weight:bold;animation:pulse 1s infinite;margin:10px 0;text-align:center}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.3);border-radius:15px;padding:15px;max-width:360px;width:100%;text-align:center;margin:10px 0}
.card h2{color:#ffd700;margin-bottom:10px}
input{width:80%;padding:10px 15px;border-radius:25px;border:2px solid #ffd700;background:rgba(255,255,255,.1);color:#fff;font-size:1.1em;text-align:center;margin:10px 0}
.btn{padding:14px 35px;border:none;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;margin:8px}
.btn-go{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0033}
.btn-go:disabled{opacity:.4}
.prize{color:#ffd700;font-size:1.1em;margin:5px 0}
.hint{color:#aaa;font-size:.8em;margin:8px 0}
.won-name{font-size:1.5em;color:#ffd700}
.fail{color:#f66;font-size:1em}
</style>
</head>
<body>
<h1>🎰 凤仪湾 · 啤酒狂欢</h1>
<div id="endedTop"></div>
<div class="card" id="card">
  <h2 id="cardTitle">请输入你的名字</h2>
  <div id="cardBody"></div>
  <div id="cardFooter"></div>
</div>
<div class="hint" id="syncHint">加载中...</div>

<script>
const STATE_URL='https://api.github.com/repos/h1h1h1hhh/lottery/contents/state.json';
const TOKEN='ghp_'+'K9nIgzCtyWhjjCUTQTLatVnUEgbEXO1Bidv5';
const ROUNDS=[
  {name:'🏆 特等奖',prize:'京东家电冰箱一台',count:1},
  {name:'🥇 一等奖',prize:'啤酒一箱+凤仪湾门票1张',count:2},
  {name:'🥈 二等奖',prize:'啤酒半箱+凤仪湾门票1张',count:3},
  {name:'🥉 三等奖',prize:'啤酒2瓶',count:6},
];
let winners={0:[],1:[],2:[],3:[]},sha='',myName='',spinning=false;

async function loadState(){
  try{
    const r=await fetch(STATE_URL,{headers:{Authorization:'token '+TOKEN},cache:'no-cache'});
    const d=await r.json();sha=d.sha;
    const s=JSON.parse(atob(d.content));
    winners=s.winners||{0:[],1:[],2:[],3:[]};
    const totalWon=Object.values(winners).flat().length;
    const totalPrizes=ROUNDS.reduce((a,r)=>a+r.count,0);
    if(totalWon>=totalPrizes){
      document.getElementById('endedTop').innerHTML='<div class="ended">🎊 抽奖已结束</div>';
    }
    document.getElementById('syncHint').textContent='剩余奖品：'+(totalPrizes-totalWon)+' 份';
  }catch(e){document.getElementById('syncHint').textContent='⚠️ 加载失败';}
}

async function saveState(){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify({winners,nameList:[]}))));
  const body=JSON.stringify({message:'抽奖',content,sha});
  const r=await fetch(STATE_URL,{method:'PUT',headers:{Authorization:'token '+TOKEN,'Content-Type':'application/json'},body});
  const d=await r.json();sha=d.content.sha;
}

function showNameInput(){
  document.getElementById('cardTitle').textContent='请输入你的名字';
  document.getElementById('cardBody').innerHTML='<input id="nameInput" placeholder="输入名字后点开始">';
  document.getElementById('cardFooter').innerHTML='<button class="btn btn-go" onclick="startSpin()">🎯 开始抽奖</button>';
}

function showSpin(){
  const won=Object.values(winners).flat();
  if(won.includes(myName)){
    // 已经中过奖了
    let prize='';
    ROUNDS.forEach((r,i)=>{if(winners[i].includes(myName))prize=r.prize;});
    document.getElementById('cardTitle').textContent='你已中奖';
    document.getElementById('cardBody').innerHTML=`<p class="won-name">🏆 ${myName}</p><p class="prize">${prize}</p><p style="color:#aaa">请到领奖处领取</p>`;
    document.getElementById('cardFooter').innerHTML='';
    return;
  }
  const totalWon=won.length;
  const totalPrizes=ROUNDS.reduce((a,r)=>a+r.count,0);
  if(totalWon>=totalPrizes){
    document.getElementById('cardTitle').textContent='来晚了！';
    document.getElementById('cardBody').innerHTML='<p class="fail">所有奖品已被抽完</p>';
    document.getElementById('cardFooter').innerHTML='';
    return;
  }
  document.getElementById('cardTitle').textContent=myName+'，试试手气！';
  document.getElementById('cardBody').innerHTML='<p style="font-size:3em">🎰</p>';
  document.getElementById('cardFooter').innerHTML='<button class="btn btn-go" onclick="doSpin()">🔄 点击抽奖</button>';
}

async function startSpin(){
  const inp=document.getElementById('nameInput');
  if(!inp||!inp.value.trim()){alert('请输入名字');return}
  myName=inp.value.trim();
  await loadState();
  showSpin();
}

async function doSpin(){
  if(spinning)return;
  await loadState();
  const won=Object.values(winners).flat();
  const totalPrizes=ROUNDS.reduce((a,r)=>a+r.count,0);
  if(won.length>=totalPrizes){
    document.getElementById('cardTitle').textContent='来晚了！';
    document.getElementById('cardBody').innerHTML='<p class="fail">所有奖品已被抽完</p>';
    document.getElementById('cardFooter').innerHTML='';
    return;
  }
  if(won.includes(myName)){
    showSpin();return;
  }
  spinning=true;
  document.getElementById('cardBody').innerHTML='<p style="font-size:3em">🎰</p><p style="color:#ffd700">抽奖中...</p>';

  // 随机决定是否中奖：基于剩余奖品数和假设参与人数
  await new Promise(r=>setTimeout(r,1500+Math.random()*1500));

  const remaining=totalPrizes-won.length;
  // 20% 概率中奖
  const win=Math.random()<0.2 && remaining>0;

  if(win){
    // 随机分配一个还有剩余的奖项
    const availRounds=[];
    ROUNDS.forEach((r,i)=>{if(winners[i].length<r.count)availRounds.push(i)});
    const ri=availRounds[Math.floor(Math.random()*availRounds.length)];
    winners[ri].push(myName);
    await saveState();
    document.getElementById('cardBody').innerHTML=`<p style="font-size:3em">🎊</p><p class="won-name">恭喜 ${myName}！</p><p class="prize">${ROUNDS[ri].prize}</p><p style="color:#aaa">请到领奖处领取</p>`;
    document.getElementById('cardFooter').innerHTML='';
  }else{
    document.getElementById('cardBody').innerHTML=`<p style="font-size:3em">😢</p><p class="fail">很遗憾，没有中奖</p><p style="color:#aaa">每人只能抽一次哦</p>`;
    document.getElementById('cardFooter').innerHTML='';
  }
  await loadState();
  spinning=false;
}

loadState();showNameInput();setInterval(loadState,15000);
</script>
</body>
</html>
